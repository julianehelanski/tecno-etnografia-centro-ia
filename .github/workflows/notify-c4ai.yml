name: Notifica tecno-etnografia-tese-site

on:
  push:
    branches: [main]
    paths:
      - "ex_cap*.tex"
      - "**/ex_cap*.tex"
      - "figuras/**"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar repository_dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.C4AI_DISPATCH_PAT }}
          repository: julianehelanski/tecno-etnografia-tese-site
          event-type: thesis-updated
          client-payload: |-
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "actor": "${{ github.actor }}"
            }
